# ---------------------------------------------------------------------------
# Reverse-proxy config for:
#   * https://a.slamx.ru     — JMP frontend + backend
#   * https://meet.slamx.ru  — Jitsi Meet
#
# This file is loaded by jonasal/nginx-certbot into /etc/nginx/user_conf.d/,
# which is included at the http{} level. That means directives like `map`
# and `upstream` belong here (outside any server{} block).
#
# The image also:
#   * auto-serves /.well-known/acme-challenge/ on port 80
#   * auto-redirects the rest of port 80 to 443
#   * requests a Let's Encrypt certificate for every `server_name` it finds
#     in this file using $CERTBOT_EMAIL, and renews on a schedule.
# ---------------------------------------------------------------------------

# Proper Connection header for both WebSocket and plain HTTP upstream calls.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream frontend { server jmp-ui:80; }
upstream backend  { server jmp-api:8080; }
upstream jitsi    { server jitsi-web:80; }
# Colibri WebSocket — direct channel to the Videobridge (port 9090).
upstream jitsi_jvb { server jitsi-jvb:9090; }

# ===========================================================================
# Main domain — JMP UI + API
# ===========================================================================
server {
    listen 443 ssl;
    http2  on;
    server_name a.slamx.ru;

    ssl_certificate     /etc/letsencrypt/live/a.slamx.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/a.slamx.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 100M;

    add_header X-Frame-Options        "SAMEORIGIN"                       always;
    add_header X-Content-Type-Options "nosniff"                          always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Backend API
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location /swagger-ui/ {
        proxy_pass http://backend/swagger-ui/;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v3/api-docs {
        proxy_pass http://backend/v3/api-docs;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /actuator/ {
        proxy_pass http://backend/actuator/;
        proxy_set_header Host $host;
    }

    # Frontend SPA — catch-all
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ===========================================================================
# Jitsi Meet — dedicated subdomain (works out of the box)
# ===========================================================================
server {
    listen 443 ssl;
    http2  on;
    server_name meet.slamx.ru;

    ssl_certificate     /etc/letsencrypt/live/meet.slamx.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meet.slamx.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 100M;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Jitsi BOSH (XMPP over HTTP)
    location = /http-bind {
        proxy_pass http://jitsi/http-bind;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Jitsi XMPP WebSocket
    location = /xmpp-websocket {
        proxy_pass http://jitsi/xmpp-websocket;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }

    # JVB colibri WebSocket — direct browser <-> Videobridge signalling.
    # Must proxy to jitsi-jvb:9090, NOT to jitsi-web. The JVB side is
    # configured via JVB_WS_DOMAIN / JVB_WS_SERVER_ID in compose.
    location ~ ^/colibri-ws/ {
        proxy_pass http://jitsi_jvb;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }

    # Jitsi web — all other requests (HTML, /libs, /css, /images, /fonts,
    # /sounds, /lang, /static, /resources, /config.js, /interface_config.js).
    location / {
        proxy_pass http://jitsi;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }
}
