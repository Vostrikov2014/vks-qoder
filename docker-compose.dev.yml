# Jitsi Management Platform - Docker Compose
# Per specification §13.5, §4.15

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: jmp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jmp
      POSTGRES_USER: jmp
      POSTGRES_PASSWORD: jmp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jmp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jmp-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: jmp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jmp-network

  # Prometheus (Metrics)
  prometheus:
    image: prom/prometheus:latest
    container_name: jmp-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - jmp-network

  # Grafana (Dashboards)
  grafana:
    image: grafana/grafana:latest
    container_name: jmp-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - jmp-network

  # MinIO (S3-compatible Object Storage)
  minio:
    image: minio/minio:latest
    container_name: jmp-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: test-access-key
      MINIO_ROOT_PASSWORD: test-secret-key
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jmp-network

  # Jitsi Prosody (XMPP Server)
  jitsi-prosody:
    image: jitsi/prosody:stable
    container_name: jmp-jitsi-prosody
    restart: unless-stopped
    environment:
      # General
      TZ: UTC
      PUBLIC_URL: http://localhost:8000
      ENABLE_AUTH: 1
      ENABLE_GUESTS: 0
      AUTH_TYPE: jwt
      # JWT configuration
      JWT_APP_ID: jmp-platform
      JWT_APP_SECRET: YWNjZXNzLXNlY3JldC1rZXktZm9yLWptcC1wbGF0Zm9ybS0yNTYtYml0cw==
      JWT_ACCEPTED_ISSUERS: jmp-platform
      JWT_ACCEPTED_AUDIENCES: jitsi
      JWT_ALLOW_EMPTY: 0
      # XMPP configuration
      XMPP_DOMAIN: meet.jitsi
      XMPP_AUTH_DOMAIN: auth.meet.jitsi
      XMPP_BOSH_URL_BASE: http://jitsi-prosody:5280
      XMPP_MUC_DOMAIN: muc.meet.jitsi
      XMPP_INTERNAL_MUC_DOMAIN: internal-muc.meet.jitsi
      XMPP_GUEST_DOMAIN: guest.meet.jitsi
      XMPP_MODULES: ''
      XMPP_MUC_MODULES: ''
      XMPP_INTERNAL_MUC_MODULES: ''
      # Jicofo credentials
      JICOFO_AUTH_USER: focus
      JICOFO_AUTH_PASSWORD: jicofo-pass-changeme
      # JVB credentials
      JVB_AUTH_USER: jvb
      JVB_AUTH_PASSWORD: jvb-pass-changeme
      JVB_BREWERY_MUC: jvbbrewery
    expose:
      - "5222"
    volumes:
      - jitsi_prosody_config:/config
      - jitsi_prosody_plugins:/prosody-plugins-custom
    networks:
      - jmp-network

  # Jitsi Jicofo (Conference Focus)
  jitsi-jicofo:
    image: jitsi/jicofo:stable
    container_name: jmp-jitsi-jicofo
    restart: unless-stopped
    environment:
      # General
      TZ: UTC
      PUBLIC_URL: http://localhost:8000
      ENABLE_AUTH: 1
      ENABLE_GUESTS: 0
      AUTH_TYPE: jwt
      # JWT configuration
      JWT_APP_ID: jmp-platform
      JWT_APP_SECRET: YWNjZXNzLXNlY3JldC1rZXktZm9yLWptcC1wbGF0Zm9ybS0yNTYtYml0cw==
      JWT_ACCEPTED_ISSUERS: jmp-platform
      JWT_ACCEPTED_AUDIENCES: jitsi
      JWT_ALLOW_EMPTY: 0
      # XMPP configuration
      XMPP_DOMAIN: meet.jitsi
      XMPP_AUTH_DOMAIN: auth.meet.jitsi
      XMPP_BOSH_URL_BASE: http://jitsi-prosody:5280
      XMPP_MUC_DOMAIN: muc.meet.jitsi
      XMPP_INTERNAL_MUC_DOMAIN: internal-muc.meet.jitsi
      XMPP_GUEST_DOMAIN: guest.meet.jitsi
      XMPP_MODULES: ''
      XMPP_MUC_MODULES: ''
      XMPP_INTERNAL_MUC_MODULES: ''
      # Jicofo credentials
      JICOFO_AUTH_USER: focus
      JICOFO_AUTH_PASSWORD: jicofo-pass-changeme
      # JVB credentials
      JVB_AUTH_USER: jvb
      JVB_AUTH_PASSWORD: jvb-pass-changeme
      JVB_BREWERY_MUC: jvbbrewery
    volumes:
      - jitsi_jicofo_config:/config
    depends_on:
      - jitsi-prosody
    networks:
      - jmp-network

  # Jitsi JVB (Video Bridge)
  jitsi-jvb:
    image: jitsi/jvb:stable
    container_name: jmp-jitsi-jvb
    restart: unless-stopped
    environment:
      # General
      TZ: UTC
      PUBLIC_URL: http://localhost:8000
      ENABLE_AUTH: 1
      ENABLE_GUESTS: 0
      AUTH_TYPE: jwt
      # JWT configuration
      JWT_APP_ID: jmp-platform
      JWT_APP_SECRET: YWNjZXNzLXNlY3JldC1rZXktZm9yLWptcC1wbGF0Zm9ybS0yNTYtYml0cw==
      JWT_ACCEPTED_ISSUERS: jmp-platform
      JWT_ACCEPTED_AUDIENCES: jitsi
      JWT_ALLOW_EMPTY: 0
      # XMPP configuration
      XMPP_DOMAIN: meet.jitsi
      XMPP_AUTH_DOMAIN: auth.meet.jitsi
      XMPP_BOSH_URL_BASE: http://jitsi-prosody:5280
      XMPP_MUC_DOMAIN: muc.meet.jitsi
      XMPP_INTERNAL_MUC_DOMAIN: internal-muc.meet.jitsi
      XMPP_GUEST_DOMAIN: guest.meet.jitsi
      XMPP_MODULES: ''
      XMPP_MUC_MODULES: ''
      XMPP_INTERNAL_MUC_MODULES: ''
      # Jicofo credentials
      JICOFO_AUTH_USER: focus
      JICOFO_AUTH_PASSWORD: jicofo-pass-changeme
      # JVB credentials
      JVB_AUTH_USER: jvb
      JVB_AUTH_PASSWORD: jvb-pass-changeme
      JVB_BREWERY_MUC: jvbbrewery
      # JVB-specific settings
      JVB_PORT: 10000
      JVB_STUN_SERVERS: meet-jit-si-turnrelay.jitsi.net:443
      JVB_TCP_HARVESTER_DISABLED: "true"
    volumes:
      - jitsi_jvb_config:/config
    ports:
      - "10000:10000/udp"
    depends_on:
      - jitsi-prosody
    networks:
      - jmp-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  minio_data:
  jitsi_web_config:
  jitsi_web_certs:
  jitsi_transcripts:
  jitsi_prosody_config:
  jitsi_prosody_plugins:
  jitsi_jicofo_config:
  jitsi_jvb_config:

networks:
  jmp-network:
    driver: bridge
