# Jitsi Management Platform - Docker Compose
# Per specification §13.5, §4.15

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: jmp-postgres
    environment:
      POSTGRES_DB: jmp
      POSTGRES_USER: jmp
      POSTGRES_PASSWORD: jmp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jmp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jmp-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: jmp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jmp-network

  # JMP Backend API
  jmp-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jmp-api
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/jmp
      DB_USER: jmp
      DB_PASS: jmp
      REDIS_URL: redis
      JWT_ACCESS_SECRET: YWNjZXNzLXNlY3JldC1rZXktZm9yLWptcC1wbGF0Zm9ybS0yNTYtYml0cw==
      JWT_REFRESH_SECRET: cmVmcmVzaC1zZWNyZXQta2V5LWZvci1qbXAtcGxhdGZvcm0tMjU2LWJpdHM=
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jmp-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # JMP Frontend (React)
  jmp-ui:
    build:
      context: ./jmp-ui
      dockerfile: Dockerfile
    container_name: jmp-ui
    environment:
      VITE_API_URL: http://localhost:8081/api/v1
    ports:
      - "5174:80"
    depends_on:
      - jmp-api
    networks:
      - jmp-network

  # Prometheus (Metrics)
  prometheus:
    image: prom/prometheus:latest
    container_name: jmp-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - jmp-network

  # Grafana (Dashboards)
  grafana:
    image: grafana/grafana:latest
    container_name: jmp-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - jmp-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  jmp-network:
    driver: bridge
