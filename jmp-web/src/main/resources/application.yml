# Jitsi Management Platform Configuration
# Per specification §18.1, §21.2

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain

spring:
  application:
    name: jmp-web
    version: 1.0.0

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jmp}
    username: ${DB_USER:jmp}
    password: ${DB_PASS:jmp}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
          lob:
            non_contextual_creation: true
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: jmp
    baseline-on-migrate: true
    create-schemas: true

  data:
    redis:
      host: ${REDIS_URL:localhost}
      port: 6379
      password: ${REDIS_PASS:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# JMP Security Configuration
jmp:
  security:
    jwt:
      access-token-secret: ${JWT_ACCESS_SECRET}
      refresh-token-secret: ${JWT_REFRESH_SECRET}
      access-token-expiration-minutes: 15
      refresh-token-expiration-days: 7

# Logging Configuration
logging:
  level:
    root: INFO
    com.jmp: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{trace_id}] %-5level %logger{36} - %msg%n"

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
    metrics:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

# Jitsi Configuration
jitsi:
  domain: ${JITSI_DOMAIN:a.slamx.ru/jitsi}
  xmpp-domain: ${JITSI_XMPP_DOMAIN:meet.jitsi}
  jwt:
    app-id: ${JITSI_JWT_APP_ID:jmp-platform}
    app-secret: ${JITSI_JWT_APP_SECRET:YWNjZXNzLXNlY3JldC1rZXktZm9yLWptcC1wbGF0Zm9ybS0yNTYtYml0cw==}
    audience: ${JITSI_JWT_AUDIENCE:jitsi}

# OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  info:
    title: Jitsi Management Platform API
    description: Centralized platform for administering, monitoring, and managing Jitsi video conferences
    version: 1.0.0
    contact:
      name: JMP Development Team
      email: dev@jmp.example.com
